<!DOCTYPE html>
<html lang="es-MX" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  </head>
  <body class="flex flex-col h-screen bg-base-100 text-base-content overflow-hidden font-sans transition-colors duration-200 ease-in-out">

    <!-- Barra de navegación -->
    <header id="header-nav" class="navbar bg-base-200 shadow-md px-4 z-50 shrink-0 border-b border-base-300">
      <div class="navbar-start flex-1">
        <div class="flex items-center">
     
          <!-- Selector de modo -->
          <select id="mode-select" class="select select-ghost font-semibold text-sm normal-case tracking-normal select-sm md:select-md text-center pl-3 pr-3 w-36 md:w-44 focus:outline-none hover:bg-base-300/50 transition-colors">
            <option value="0" disabled selected>Modo</option>
            <option value="1">Manual</option>
            <option value="2">Seguidor</option>
            <option value="3">Obstáculos</option>
            <option value="4">Navegación</option>
          </select>
        </div>
      </div>
      
      <div class="navbar-end flex items-center gap-3 md:gap-5">

        <!-- Estado MQTT -->
        <div id="mqtt-status" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-base-100/60 backdrop-blur border border-base-300">
          <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-info animate-pulse"></span>
          <span id="status-text" class="hidden sm:inline text-xs font-medium opacity-70">
            Conectando
          </span>
        </div>
        
        <!-- Controlador del tema -->
        <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm md:btn-md">
          <input type="checkbox" class="theme-controller" value="light"/>
          <svg class="swap-on h-5 w-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
          </svg>
          <svg class="swap-off h-5 w-5 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/>
          </svg>
        </label>
        
        <!-- GitHub link -->
        <a href="https://github.com/gusgus196/carro_iot/" target="_blank" class="btn btn-ghost btn-circle btn-sm md:btn-md opacity-80 hover:opacity-100 transition-opacity">
          <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- Interfaz del modo -->
    <main id="mode-interface" class="flex-1 relative overflow-hidden bg-base-300/10 flex items-center justify-center transition-all duration-500">
      <div id="interface-placeholder" class="flex flex-col items-center gap-3">    
        <p class="text-lg md:text-xl font-medium tracking-wide opacity-60 text-center select-none">
          Selecciona un modo para comenzar
        </p>
      </div>
    </main>
    
    <script type="module" src="main.js"></script>
  </body>
</html>
