<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Web</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <!--Div para el select del modo y estado del broker MQTT-->
    <div class="header-nav">
      <select id="mode-select">
        <option value="0" disabled selected>Selecciona un modo</option>
        <option value="1">Control manual</option>
        <option value="2">Seguidor de línea</option>
        <option value="3">Evitar obstáculos</option>
        <option value="4">Navegación GPS</option>
      </select>

      <div id="mqtt-status">
        <span id="status-dot" class="status-dot status-connecting"></span>
        <span id="status-text">CONECTANDO</span>
      </div>
    </div>

    <!--Div para la interfaz del modo-->
    <div id="interface-space">
      <p class="placeholder-text">Selecciona un modo para comenzar</p>
    </div>

    <!--Div para alerta personalizada-->
    <div id="custom-notification">
      <span id="notification-title"></span>
      <div id="notification-body"></div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
